apply plugin: 'com.android.application'

android {
    compileSdkVersion 30
    defaultConfig {
        applicationId "eu.andret.kalendarzswiatnietypowych"
        minSdkVersion 19
        targetSdkVersion 30
        versionCode 43
        versionName "2.2.0"
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        targetCompatibility JavaVersion.VERSION_1_8
        sourceCompatibility JavaVersion.VERSION_1_8
    }
    buildToolsVersion '30.0.2'
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    //noinspection AnnotationProcessorOnCompilePath
    compileOnly group: 'org.projectlombok', name: 'lombok', version: '1.18.22'
    implementation group: 'com.android.support', name: 'support-v4', version: '30.0.0'
    implementation group: 'com.android.support', name: 'customtabs', version: '30.0.0'
    implementation group: 'com.android.support', name: 'appcompat-v7', version: '30.0.0'
    implementation group: 'com.google.android.gms', name: 'play-services-ads', version: '20.4.0'
    annotationProcessor group: 'org.projectlombok', name: 'lombok', version: '1.18.22'
}
