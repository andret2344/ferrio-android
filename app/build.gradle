apply plugin: 'com.android.application'

android {
    compileSdkVersion 31
    defaultConfig {
        applicationId "eu.andret.kalendarzswiatnietypowych"
        minSdkVersion 19
        targetSdkVersion 31
        versionCode 50
        versionName "2.2.3-rc.2"
        multiDexEnabled true
    }
    buildTypes {
        release {
            shrinkResources true
            minifyEnabled true
            debuggable false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
        debug {
            debuggable true
            shrinkResources false
        }
    }
    compileOptions {
        targetCompatibility JavaVersion.VERSION_1_8
        sourceCompatibility JavaVersion.VERSION_1_8
        coreLibraryDesugaringEnabled true
    }
    buildToolsVersion '30.0.2'
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    //noinspection AnnotationProcessorOnCompilePath
    compileOnly group: 'org.projectlombok', name: 'lombok', version: '1.18.22'

    implementation group: 'com.google.android.gms', name: 'play-services-ads', version: '20.4.0'
    implementation group: 'com.google.android.material', name: 'material', version: '1.5.0-alpha05'

    implementation group: 'com.android.support', name: 'multidex', version: '2.0.1'

    implementation group: 'net.sourceforge.streamsupport', name: 'android-retrofuture', version: '1.7.4'

    implementation group: 'androidx.appcompat', name: 'appcompat', version: '1.3.1'
    implementation group: 'androidx.preference', name: 'preference', version: '1.1.1'
    implementation group: 'androidx.viewpager2', name: 'viewpager2', version: '1.0.0'
    implementation group: 'androidx.navigation', name: 'navigation-fragment', version: '2.3.5'
    implementation group: 'androidx.navigation', name: 'navigation-ui', version: '2.3.5'

    annotationProcessor group: 'org.projectlombok', name: 'lombok', version: '1.18.22'
    annotationProcessor group: 'org.jetbrains', name: 'annotations', version: '21.0.1'
    coreLibraryDesugaring group: 'com.android.tools', name: 'desugar_jdk_libs', version: '1.1.5'

    testImplementation group: 'junit', name: 'junit', version: '4.13.2'
    androidTestImplementation group: 'androidx.test.ext', name: 'junit', version: '1.1.3'
    androidTestImplementation group: 'androidx.test.espresso', name: 'espresso-core', version: '3.4.0'
}
