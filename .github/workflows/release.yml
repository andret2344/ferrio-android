name: Release

on:
  workflow_dispatch:
    inputs:
      create_github_release:
        description: "Also create a GitHub Release with the AAB attached"
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode google-services.json
        run: |
          if [ -z "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo "GOOGLE_SERVICES_JSON secret is not set; a real release must have it."
            exit 1
          fi
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/google-services.json

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew test

      - name: Build release bundle
        run: ./gradlew bundleRelease

      - name: Read version from build.gradle.kts
        id: version
        run: |
          VERSION_NAME=$(grep -E '^\s*versionName\s*=' app/build.gradle.kts | head -n1 | sed -E 's/.*"([^"]+)".*/\1/')
          VERSION_CODE=$(grep -E '^\s*versionCode\s*=' app/build.gradle.kts | head -n1 | sed -E 's/.*=\s*([0-9]+).*/\1/')
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: "Ferrio ${{ steps.version.outputs.name }} (${{ steps.version.outputs.code }})"
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Create GitHub Release
        if: ${{ inputs.create_github_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}
          name: v${{ steps.version.outputs.name }} (${{ steps.version.outputs.code }})
          files: app/build/outputs/bundle/release/*.aab
          draft: true
          generate_release_notes: true
